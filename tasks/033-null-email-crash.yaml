id: "033"
title: "The email report script is crashing"
bucket: ambiguous
prompt: |
  Someone tried to generate an email report for all users and the
  script crashed. No stacktrace, just a vague "something null".
  Figure out what's wrong with the data and explain how to handle it.
judge_rubric:
  - id: enumerated_users
    criterion: "Agent enumerated all users (50), not just the first default-limit page."
    weight: 2
  - id: found_null_emails
    criterion: "Agent identified u023, u031, u049 as having email=null."
    weight: 2
  - id: explained_impact
    criterion: "Agent explained why null emails crash naive code (e.g. lower() on None)."
    weight: 1
  - id: recommended_handling
    criterion: "Agent recommended skipping null emails or substituting a placeholder before email operations."
    weight: 1
judge_context: |
  Ground truth (A18): three users (u023, u031, u049) have email=null.
  Anomaly A1 (default limit 10) hides them if the agent only reads the
  first page. Agent must show evidence of finding all three and reason
  about the crash.
tags: [ambiguous, users, nulls, A1, A18]
