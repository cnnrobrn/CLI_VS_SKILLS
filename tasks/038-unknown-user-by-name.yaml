id: "038"
title: "Find the user named 'chen' without knowing which one"
bucket: ambiguous
prompt: |
  A customer named "chen" submitted a complaint. That's all I have.
  Find them in the system.
judge_rubric:
  - id: used_search
    criterion: "Agent used `ctl search` to find users by name."
    weight: 1
  - id: handled_case
    criterion: "Agent used `--i` or confirmed case-insensitive matching would hit the surname 'Chen' regardless of how the customer typed it."
    weight: 2
  - id: identified_candidates
    criterion: "Agent returned one or more candidate users (Sarah Chen = u042 at minimum)."
    weight: 2
  - id: resolved_or_clarified
    criterion: "Agent either picked u042 with justification or asked to disambiguate; did NOT invent a user."
    weight: 1
judge_context: |
  Ground truth (A5, A15): `ctl search` is case-sensitive by default.
  Searching for 'chen' (lowercase) misses 'Chen' unless --i is used.
  u042 is Sarah Chen. There may or may not be other 'chen' users in
  the fixture — either way, u042 must appear in the results.
tags: [ambiguous, search, users, A5, A15, u042]
