id: "046"
title: "Customer complaint: 'my orders just disappeared'"
bucket: ambiguous
setup: |
  ./cli/bin/ctl pipeline run pipe-07
prompt: |
  A customer is complaining their orders "just disappeared, the site
  shows fewer than I actually placed." Figure out what's happening.
judge_rubric:
  - id: connected_to_pipe07
    criterion: "Agent connected the missing-orders symptom to pipe-07 partial-apply rather than blaming the customer."
    weight: 3
  - id: checked_pipe_status
    criterion: "Agent ran `ctl pipeline status pipe-07` and confirmed status=partial."
    weight: 2
  - id: mentioned_resume
    criterion: "Agent mentioned --resume (or --rollback) as the recovery path."
    weight: 2
judge_context: |
  Ground truth (A10): pipe-07 was run in setup and is now partial at
  147/200. The complaint 'my orders disappeared' maps to the partial
  apply. Agent that escalates to 'probably cache' or 'bug in frontend'
  without checking pipeline status fails connected_to_pipe07.
tags: [ambiguous, pipelines, orders, A10, pipe-07]
