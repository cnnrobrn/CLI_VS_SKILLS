id: "091"
title: "Summarize the incident runbook in one page"
bucket: non-file
prompt: |
  Find the runbook for the pipe-07 incident and summarize it in a
  one-page writeup suitable for on-call engineers. Mention how to
  detect, how to recover, and what state to verify after recovery.
judge_rubric:
  - id: found_runbook
    criterion: "Agent fetched /runbook/incident-42 (via /docs/troubleshooting link or otherwise)."
    weight: 1
  - id: detection
    criterion: "Summary includes specific detection steps (`ctl pipeline status pipe-07`, watch for status=partial)."
    weight: 2
  - id: recovery_options
    criterion: "Summary covers --resume vs --rollback trade-offs."
    weight: 2
  - id: post_verification
    criterion: "Summary lists post-recovery verification (e.g., confirm o088/o091 status, cache clear, reindex)."
    weight: 2
  - id: grounded
    criterion: "Content reflects the actual runbook body in the transcript."
    weight: 1
judge_context: |
  Ground truth (A10, A16): runbook at /runbook/incident-42
  documents the 2026-04-18 pipe-07 incident. Agent must actually
  fetch it.
tags: [non-file, documentation, pipelines, A10, A16, pipe-07]
