id: "089"
title: "Warn new engineers about the --limit default"
bucket: non-file
prompt: |
  Write a 5-bullet cookbook entry (for internal docs) warning new
  engineers about the ctl default --limit pitfall. Include a concrete
  example of how it silently gives a wrong answer.
judge_rubric:
  - id: empirical_example
    criterion: "Agent produced a concrete example using real transcript data (e.g., 'listing users returns 10 but there are 50')."
    weight: 2
  - id: cites_exact_limit
    criterion: "Cookbook cites the exact default (10)."
    weight: 1
  - id: five_bullets
    criterion: "Output is exactly five (or roughly five) bullet points."
    weight: 1
  - id: recommendation
    criterion: "Includes a specific recommendation (use --limit N, paginate, or check totals before trusting)."
    weight: 2
  - id: avoids_generic
    criterion: "Avoids generic advice like 'always read the docs'; each bullet is specific to ctl."
    weight: 1
judge_context: |
  Ground truth (A1): default limit 10. Agent should demonstrate the
  trap with real numbers (users=50, orders=120, products=80).
tags: [non-file, documentation, pagination, A1]
