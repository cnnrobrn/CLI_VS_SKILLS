id: "093"
title: "Explain the u017 refunds to a customer"
bucket: non-file
prompt: |
  u017 emailed us: "what happened to my orders o088 and o091, they
  got refunded out of nowhere?" Write a reply that explains clearly
  and takes responsibility without being overly legalistic.
judge_rubric:
  - id: investigated
    criterion: "Agent verified the orders' current status and the pipe-07 linkage via ctl."
    weight: 1
  - id: acknowledges_pipeline
    criterion: "Reply explicitly attributes the refunds to the 2026-04-18 backfill incident (pipe-07)."
    weight: 2
  - id: offers_remedy
    criterion: "Reply offers a concrete remedy (reprocess, credit, etc.) rather than just apologies."
    weight: 2
  - id: tone
    criterion: "Tone is accountable and customer-facing — not internal jargon."
    weight: 1
  - id: avoids_fabrication
    criterion: "Reply does not invent details like specific dollar amounts that aren't in the fixture data."
    weight: 1
judge_context: |
  Ground truth (A10): o088, o091 refunded 2026-04-18 as pipe-07
  partial collateral. Customer-appropriate language required; the
  cause is real and acknowledgeable.
tags: [non-file, writing, orders, A10, u017]
