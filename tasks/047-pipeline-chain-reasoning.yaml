id: "047"
title: "Why does pipe-05 keep failing"
bucket: ambiguous
prompt: |
  My teammate says pipe-05 keeps failing with "prerequisite not met"
  and they don't know what prereq. Figure out and tell them exactly
  what to do.
judge_rubric:
  - id: identified_prereq
    criterion: "Agent identified that pipe-05 requires pipe-03 to have run FIRST in the same session."
    weight: 3
  - id: verified_empirically
    criterion: "Agent either ran pipe-03 then pipe-05 to verify, or cited a documented source (skills / runbook)."
    weight: 2
  - id: clear_instructions
    criterion: "Final answer tells the teammate exactly which commands to run in which order."
    weight: 2
judge_context: |
  Ground truth (A3): pipe-05 requires pipe-03 ran first. 'prerequisite
  not met' is the error. Instruction: run `ctl pipeline run pipe-03`
  then `ctl pipeline run pipe-05`.
tags: [ambiguous, pipelines, A3, pipe-05]
