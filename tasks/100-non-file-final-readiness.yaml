id: "100"
title: "Readiness memo: is the system healthy enough to ship today"
bucket: non-file
prompt: |
  Write a readiness memo for a ship decision today. Must cover:
  pipeline state, data integrity, open escalations, any stale
  caches/indices, and a final recommendation (ship / hold / ship
  with conditions). Include concrete ids and numbers.
judge_rubric:
  - id: investigated_broadly
    criterion: "Agent gathered evidence across pipelines, tickets, caches, and data before writing."
    weight: 2
  - id: concrete_ids
    criterion: "Memo includes specific ids (at minimum: pipe-07 status, t019, u042, and a pipe-09 verdict)."
    weight: 2
  - id: final_recommendation
    criterion: "Memo ends with an explicit ship/hold/conditional decision."
    weight: 1
  - id: conditions_specific
    criterion: "If ship-with-conditions, the conditions are specific and testable (e.g., 'rollback pipe-07 first', 'reindex search', 'resolve t019')."
    weight: 2
  - id: grounded
    criterion: "Every claim maps to transcript evidence; no fabrication."
    weight: 1
judge_context: |
  Ground truth: capstone task — touches A6/A7 (cache+search), A10
  (partial pipe-07), A11 (pipe-09 requires --verify), A15 (u042 /
  t019 / flagged orders). A 'ship, all green' recommendation is
  wrong if the agent never ran --verify or never checked pipe-07.
tags: [non-file, executive, breadth, A6, A7, A10, A11, A15]
