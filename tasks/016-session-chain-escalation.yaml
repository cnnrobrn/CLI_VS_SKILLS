id: "016"
title: "Chain: escalated ticket → user → their active session"
bucket: stateful
prompt: |
  Find the escalated ticket. Identify the user. Is that user currently
  logged in (does an active session exist for them)? If yes, give me
  the session id and when it started.
rule_check:
  - id: found_escalated_ticket
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*tickets.*escalated"
    weight: 2
  - id: checked_u042_sessions
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*sessions.*u042|^ctl (list|search).*u042.*sessions"
    weight: 2
  - id: sequence_ticket_then_sessions
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl (list|search).*tickets" }
      - { argv_regex: "^ctl (list|search).*sessions" }
    weight: 2
  - id: no_unrelated_user_sessions
    assert: no_tool_called
    match:
      argv_regex: "^ctl (list|search).*sessions.*u(?!042)[0-9]{3}"
    weight: 1
tags: [tickets, users, sessions, stateful, u042, A15]
