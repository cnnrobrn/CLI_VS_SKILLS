id: "048"
title: "Should I trust the inventory reconcile result"
bucket: ambiguous
prompt: |
  I just ran `ctl pipeline run pipe-09`. It exited 0 with 'status:
  ok'. Should I trust it? Prove your answer.
judge_rubric:
  - id: did_not_trust_plain_run
    criterion: "Agent answered NO — the plain run's 'ok' is NOT trustworthy."
    weight: 2
  - id: ran_with_verify
    criterion: "Agent ran `ctl pipeline run pipe-09 --verify` (to prove untrustworthiness)."
    weight: 2
  - id: surfaced_discrepancies
    criterion: "Agent reported 3 discrepancies on p014, p037, p061 from --verify."
    weight: 2
  - id: explained_why
    criterion: "Final answer explains that pipe-09's exit code is uncorrelated with correctness without --verify."
    weight: 1
judge_context: |
  Ground truth (A11): pipe-09 exits 0 / status=ok without --verify
  but hides 3 discrepancies. --verify surfaces p014, p037, p061. A
  confident 'yes trust it' answer based on exit code is the failure
  mode.
tags: [ambiguous, pipelines, products, A11, pipe-09]
