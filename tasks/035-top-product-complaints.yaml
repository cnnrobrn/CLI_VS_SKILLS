id: "035"
title: "Which product draws the most complaints"
bucket: ambiguous
prompt: |
  Figure out which product is generating the most support tickets and
  what users are saying about it. Be specific.
judge_rubric:
  - id: linked_tickets_to_products
    criterion: "Agent joined tickets to products via user-orders or ticket body content (not guessed)."
    weight: 2
  - id: enumerated_all_tickets
    criterion: "Agent listed tickets beyond the default limit or justified that default is sufficient."
    weight: 1
  - id: defensible_winner
    criterion: "Agent named a product and cited specific tickets as evidence."
    weight: 2
  - id: sample_quotes
    criterion: "Final answer quotes at least 2 ticket subjects/bodies to support the conclusion."
    weight: 1
judge_context: |
  Ground truth: open-ended aggregation. Judge checks that the agent's
  chosen product is backed by evidence in the transcript (ticket ids
  traceable to that product, e.g. via the user's orders). Don't
  enforce a specific product id — grade the reasoning.
tags: [ambiguous, tickets, products, aggregation, reasoning]
