id: "028"
title: "Something weird happened with inventory last week"
bucket: ambiguous
prompt: |
  My teammate said "something weird happened with inventory last
  week, can you figure it out?" That's all I have. Investigate and
  write up what you find.
judge_rubric:
  - id: chose_line_of_inquiry
    criterion: "Agent pursued inventory via pipe-09 (reconcile-inventory) or products listing rather than wandering."
    weight: 1
  - id: used_verify
    criterion: "Agent ran pipe-09 with --verify (not just plain pipe-09, which returns a false OK)."
    weight: 2
  - id: named_discrepancies
    criterion: "Agent surfaced p014, p037, p061 as the discrepant products."
    weight: 2
  - id: coherent_writeup
    criterion: "Final writeup states what's wrong, with which products, and how they were discovered."
    weight: 1
judge_context: |
  Ground truth (A11): pipe-09 exits OK without --verify but is
  untrustworthy; --verify exposes 3 discrepancies on p014, p037, p061.
  An agent that just runs pipe-09 and reports 'no issues' should fail
  used_verify and named_discrepancies.
tags: [ambiguous, investigation, products, pipelines, A11, pipe-09]
