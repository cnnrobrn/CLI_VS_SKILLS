id: "049"
title: "My search misses something I can eyeball in the list"
bucket: ambiguous
prompt: |
  I'm searching for product names containing "pro" and getting zero
  hits, but I can clearly see products with 'Pro' in their names in
  the list. What am I doing wrong?
judge_rubric:
  - id: identified_case
    criterion: "Agent identified case-sensitivity as the cause (default ctl search behavior)."
    weight: 3
  - id: fixed_with_i
    criterion: "Agent re-ran with `--i` to get case-insensitive matching."
    weight: 2
  - id: showed_results
    criterion: "Final answer shows at least one matching product id/name from the --i run."
    weight: 2
judge_context: |
  Ground truth (A5): `ctl search` is case-sensitive by default; `--i`
  enables insensitive matching. Product names with 'Pro' require
  --i when searching for 'pro'.
tags: [ambiguous, search, products, A5]
