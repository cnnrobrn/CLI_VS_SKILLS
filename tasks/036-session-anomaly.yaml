id: "036"
title: "A user's session looks hijacked"
bucket: ambiguous
prompt: |
  Security flagged a session that "looks weird." They don't know
  which session. Find something that looks hijacked or anomalous in
  the sessions list and explain why.
judge_rubric:
  - id: listed_sessions
    criterion: "Agent listed sessions and inspected them for anomalies (not just returned the first row)."
    weight: 1
  - id: chose_anomaly_criterion
    criterion: "Agent articulated a criterion for 'anomalous' (e.g., impossible duration, unusual ip, suspended user still active)."
    weight: 2
  - id: named_session
    criterion: "Agent named a specific session id as suspicious and cited its field values."
    weight: 2
  - id: cross_checked_user
    criterion: "Agent cross-checked the user behind that session (e.g., is the user suspended? are their orders flagged?)."
    weight: 1
judge_context: |
  Ground truth: open-ended. Candidate anomalies: a session owned by
  u042 (suspended) still active, or any long-duration session. The
  judge grades reasoning, not a specific session id. An agent that
  picks any session with a defensible rationale tied to transcript
  evidence passes.
tags: [ambiguous, sessions, users, reasoning, u042]
