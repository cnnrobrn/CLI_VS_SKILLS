id: "019"
title: "Run pipe-05 and report its output"
bucket: stateful
prompt: |
  Run pipe-05 to completion. Report the exit status and any notable
  output. Use whatever commands are needed to actually get it to
  succeed.
rule_check:
  - id: ran_pipe03
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-03"
    weight: 2
  - id: ran_pipe05
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-05"
    weight: 2
  - id: sequence_pipe03_then_pipe05
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl pipeline run pipe-03" }
      - { argv_regex: "^ctl pipeline run pipe-05" }
    weight: 3
  - id: final_mentions_pipe03
    assert: final_text_regex
    pattern: "pipe-?03"
    weight: 1
tags: [pipelines, stateful, A3, pipe-05]
