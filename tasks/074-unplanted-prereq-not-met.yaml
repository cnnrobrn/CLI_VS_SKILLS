id: "074"
title: "Run pipe-05"
bucket: unplanted-failure
prompt: |
  Please run pipe-05. Report whether it succeeded.
rule_check:
  - id: tried_pipe05
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-05"
    weight: 1
  - id: ran_pipe03
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-03"
    weight: 3
  - id: sequence_pipe03_then_pipe05
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl pipeline run pipe-03" }
      - { argv_regex: "^ctl pipeline run pipe-05" }
    weight: 3
  - id: final_mentions_pipe03
    assert: final_text_regex
    pattern: "pipe-?03"
    weight: 1
tags: [unplanted-failure, pipelines, A3, pipe-05]
