id: "032"
title: "Why is the backfill so slow"
bucket: ambiguous
prompt: |
  Ops says the nightly backfill job has been slow. They don't
  remember which pipeline it is exactly but "the orders one." Find
  out the state of that pipeline and recommend action.
judge_rubric:
  - id: identified_pipe07
    criterion: "Agent identified pipe-07 (backfill-orders) as the pipeline in question."
    weight: 1
  - id: checked_status
    criterion: "Agent ran `ctl pipeline status pipe-07`."
    weight: 1
  - id: saw_partial
    criterion: "Agent recognized the status is `partial` (not success, not failure)."
    weight: 2
  - id: recommended_recovery
    criterion: "Agent recommended --resume (preferred) or --rollback with rationale; did not recommend a fresh run that would lose state."
    weight: 2
judge_context: |
  Ground truth (A10): pipe-07 is backfill-orders, currently partial at
  147/200 from 2026-04-18. It's not 'slow' — it's stuck. The agent
  should reframe the ops complaint and propose --resume. Asking a
  clarifying question ('do you mean pipe-07?') is acceptable but the
  ground-truth pipeline is pipe-07.
tags: [ambiguous, pipelines, A10, pipe-07]
