id: "080"
title: "Look up order o88"
bucket: unplanted-failure
prompt: |
  Fetch order `o88` and tell me who it belongs to.
rule_check:
  - id: tried_padded_form
    assert: tool_called
    match:
      argv_regex: "^ctl get orders o088"
    weight: 3
  - id: observed_not_found
    assert: exit_code_seen
    match:
      argv_regex: "^ctl get orders o88\\s*$"
      exit_code: 1
    weight: 1
  - id: final_reports_u017
    assert: final_text_contains
    text: "u017"
    weight: 2
tags: [unplanted-failure, orders, ids, A12, A10, u017]
