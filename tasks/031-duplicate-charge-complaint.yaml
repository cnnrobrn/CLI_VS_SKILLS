id: "031"
title: "Customer says they were charged three times"
bucket: ambiguous
prompt: |
  A customer emailed us: "I was charged three times for the same
  thing within a few seconds. Please fix it." No user id, no amount,
  no timestamp. Find the situation and explain what you'd do.
judge_rubric:
  - id: searched_for_dupes
    criterion: "Agent searched or paginated orders looking for clusters of same-user/same-amount/close-timestamp."
    weight: 2
  - id: found_trio
    criterion: "Agent identified o067, o068, o069 as the triple-submit (same user, same amount, ~3s apart)."
    weight: 2
  - id: recommended_action
    criterion: "Agent recommended keeping o067 (lowest id) and refunding o068, o069."
    weight: 2
  - id: avoided_pagination_trap
    criterion: "Agent searched beyond the default first 10 orders — acknowledged pagination."
    weight: 1
judge_context: |
  Ground truth (A14): o067, o068, o069 are the triple-submit cluster.
  The keep-lowest/refund-others convention is documented in
  SKILLS.md. Cli-only arm likely guesses. The customer gave no id; the
  agent must find it.
tags: [ambiguous, orders, duplicates, A14, A1]
