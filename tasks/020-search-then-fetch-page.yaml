id: "020"
title: "Use search to find a doc, then fetch and summarize it"
bucket: stateful
prompt: |
  Search the documentation corpus for content about "authentication".
  Pick the most relevant page, fetch it, and give me a one-paragraph
  summary.
rule_check:
  - id: used_search_docs
    assert: tool_called
    match:
      argv_regex: "^ctl search.*(authentication|Authentication|auth)"
    weight: 2
  - id: fetched_a_page
    assert: tool_called
    match:
      argv_regex: "^ctl fetch /?(docs|pages|runbook|help)/"
    weight: 2
  - id: cleared_cache_if_needed
    assert: tool_called
    match:
      argv_regex: "^ctl cache clear"
    weight: 1
  - id: sequence_search_then_fetch
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl search" }
      - { argv_regex: "^ctl fetch" }
    weight: 2
tags: [search, fetch, pages, stateful, A5, A7]
