id: "096"
title: "Investigative report: are we losing money to dup submits"
bucket: non-file
prompt: |
  Someone senior asked "are we quietly losing money to duplicate
  submissions?" Investigate and write a 1-page report with a
  yes/no/partial answer, evidence, and recommended next action.
judge_rubric:
  - id: found_triple
    criterion: "Agent identified the triple-submit cluster o067/o068/o069."
    weight: 2
  - id: quantified_exposure
    criterion: "Report quantifies exposure — e.g., '2 duplicate orders at $X each' with actual amount from the fixture."
    weight: 2
  - id: recommended_policy
    criterion: "Report recommends a specific policy (idempotency keys, rate-limit submit, dedup job) not generic 'investigate more'."
    weight: 2
  - id: verdict
    criterion: "Report gives a clear verdict (yes/no/partial) with defensible reasoning."
    weight: 1
judge_context: |
  Ground truth (A14): o067, o068, o069 are the triple-submit. Amount
  and user from fixture. SKILLS.md documents the keep-lowest
  convention.
tags: [non-file, writing, orders, A14]
