id: "026"
title: "Investigate Sarah's complaint about billing"
bucket: ambiguous
prompt: |
  A customer named Sarah is complaining that "billing has been broken
  since the weekend." Figure out what's going on and write a short
  investigation summary.
judge_rubric:
  - id: identified_sarah
    criterion: "Agent identified u042 / Sarah Chen as the customer (via search, list, or ticket lookup — not a guess)."
    weight: 2
  - id: found_ticket_and_status
    criterion: "Agent found ticket t019 AND noticed u042's status=suspended (flipped 2026-04-22)."
    weight: 2
  - id: noted_flagged_orders
    criterion: "Agent noticed at least one of the flagged orders (o102, o107, o115) on Sarah's account."
    weight: 1
  - id: coherent_summary
    criterion: "Final summary connects Sarah → escalated ticket → suspension → flagged orders into a coherent story rather than a disjointed list."
    weight: 2
judge_context: |
  Ground truth (A15): u042 = Sarah Chen (sarah.chen@acme.io); status
  flipped to suspended on 2026-04-22; orders o102, o107, o115 flagged;
  ticket t019 escalated with subject "billing broken since the
  weekend". The prompt is deliberately fuzzy — the agent should
  narrow 'Sarah' via search or list. Case-sensitive search default (A5)
  may bite.
tags: [ambiguous, investigation, u042, A15, A5]
