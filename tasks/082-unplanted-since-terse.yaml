id: "082"
title: "Orders from the last 24 hours"
bucket: unplanted-failure
prompt: |
  List orders from the last 24 hours. Give me the count.
rule_check:
  - id: used_since
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*orders.*--since\\s+(24h|1d|2026-04-23)"
    weight: 3
  - id: listed_orders
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*orders.*--since"
    weight: 1
  - id: final_has_count
    assert: final_text_regex
    pattern: "[0-9]+"
    weight: 2
tags: [unplanted-failure, orders, time-window, A9]
