id: "095"
title: "Onboarding note: how to run pipe-05 from scratch"
bucket: non-file
prompt: |
  Write a short onboarding note that teaches a new engineer how to
  run pipe-05 successfully from a fresh shell. Include exactly the
  commands in order, and a one-line explanation per command.
judge_rubric:
  - id: prereq_first
    criterion: "Onboarding note runs pipe-03 BEFORE pipe-05."
    weight: 3
  - id: explains_why
    criterion: "Note explains WHY pipe-03 must run first (prerequisite / same-session)."
    weight: 2
  - id: commands_exact
    criterion: "Commands are exact, runnable ctl invocations (no pseudocode)."
    weight: 1
  - id: sanity_check
    criterion: "Note includes a post-run sanity check (e.g., `ctl pipeline status pipe-05`)."
    weight: 1
judge_context: |
  Ground truth (A3): pipe-05 requires pipe-03 same-session. An
  onboarding note that skips pipe-03 is a trap.
tags: [non-file, documentation, pipelines, A3, pipe-03, pipe-05]
