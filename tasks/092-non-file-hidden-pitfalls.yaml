id: "092"
title: "Document the top 5 hidden pitfalls of ctl"
bucket: non-file
prompt: |
  Based on your own observations while using ctl in recent tasks,
  document the top 5 hidden pitfalls — behaviors that silently give
  wrong answers or mislead operators. Give a one-line name, a
  one-paragraph explanation, and a concrete example for each.
judge_rubric:
  - id: five_pitfalls
    criterion: "Agent named FIVE distinct pitfalls."
    weight: 1
  - id: each_is_real
    criterion: "Each pitfall corresponds to a documented anomaly (e.g., default-limit, case-sensitive search, stale cache, diff silent on type mismatch, pipe-09 false OK, --since terse error, table truncation)."
    weight: 3
  - id: concrete_example
    criterion: "Each pitfall has a concrete command-line example (not abstract prose)."
    weight: 2
  - id: no_fabrication
    criterion: "Agent did NOT invent pitfalls the CLI doesn't actually have."
    weight: 1
judge_context: |
  Ground truth: candidate pitfalls include A1, A5, A7, A8, A9, A11,
  A13, A12, A17, A18. Any 5 of these qualify. The judge should
  reject fabricated pitfalls.
tags: [non-file, documentation, anomalies, A1, A5, A7, A8, A9, A11, A12, A13, A17, A18]
