id: "086"
title: "Explain what went wrong with pipe-07 and prevention plan"
bucket: non-file
prompt: |
  In a written post-mortem, explain what happened with pipe-07 on
  2026-04-18, which records were affected, how to detect this class
  of failure in the future, and what you'd change to prevent it.
judge_rubric:
  - id: investigated
    criterion: "Agent actually investigated using ctl (pipeline status, order listings, runbook fetch) rather than writing a post-mortem from imagination."
    weight: 2
  - id: named_affected
    criterion: "Post-mortem names the specific collateral orders (o088, o091) and their owner (u017)."
    weight: 2
  - id: detection_plan
    criterion: "Post-mortem proposes a specific detection (e.g., alert on `pipeline status ... partial`, monitor unexpected refund clusters, /runbook/incident-42 as reference)."
    weight: 2
  - id: prevention_plan
    criterion: "Post-mortem proposes a specific prevention (e.g., transactional batches, pre-flight dry-run, --verify equivalent) with reasoning."
    weight: 2
judge_context: |
  Ground truth (A10, A16): pipe-07 partial at 147/200 on 2026-04-18
  with collateral refunds o088, o091 (u017). Runbook at
  /runbook/incident-42. A good post-mortem is specific and
  evidence-based.
tags: [non-file, post-mortem, pipelines, A10, A16, u017]
