id: "041"
title: "User's email doesn't look right in the table"
bucket: ambiguous
prompt: |
  When I run `ctl list users --format table`, one user's email column
  ends in '…' — I can't tell what their actual email is. Figure out
  how to see the full value.
judge_rubric:
  - id: identified_truncation
    criterion: "Agent recognized the `…` as table-format truncation rather than a real suffix."
    weight: 2
  - id: switched_format
    criterion: "Agent re-ran with `--format json` (or `ctl get users <id>` for that user) to see the full email."
    weight: 2
  - id: reported_full
    criterion: "Final answer provides the full email value from the json output."
    weight: 1
judge_context: |
  Ground truth (A13): `--format table` truncates long fields with `…`;
  `--format json` shows full values. The anomaly is specifically
  designed to catch agents that trust the table. An agent that claims
  the email literally ends in `…` fails identified_truncation.
tags: [ambiguous, format, users, A13]
