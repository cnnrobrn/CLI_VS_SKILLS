id: "006"
title: "Identify the product that appears in the most orders"
bucket: stateful
prompt: |
  Which product id appears in the most orders? Fetch its full record
  and report its name and price.
rule_check:
  - id: listed_all_orders
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*orders.*--limit\\s+([1-9][0-9]{2,})"
    weight: 3
  - id: fetched_product
    assert: tool_called
    match:
      argv_regex: "^ctl get products p[0-9]{3}"
    weight: 2
  - id: no_bare_list_orders
    assert: no_tool_called
    match:
      argv_regex: "^ctl list orders\\s*$"
    weight: 1
  - id: sequence_orders_then_product
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl (list|search).*orders" }
      - { argv_regex: "^ctl get products p[0-9]{3}" }
    weight: 1
tags: [orders, products, stateful, pagination, A1]
