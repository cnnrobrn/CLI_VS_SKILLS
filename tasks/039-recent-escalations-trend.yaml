id: "039"
title: "Are escalations up this week"
bucket: ambiguous
prompt: |
  Leadership wants to know: are escalations up this week compared to
  prior weeks? Give a one-paragraph answer with numbers.
judge_rubric:
  - id: listed_tickets_with_window
    criterion: "Agent listed tickets filtered by --since (7d or an ISO8601 date) to scope 'this week'."
    weight: 2
  - id: handled_since_error
    criterion: "If agent hit the terse 'invalid date' error, it recovered with a valid format (ISO8601 or relative like 7d, 24h)."
    weight: 1
  - id: compared_windows
    criterion: "Agent fetched AT LEAST two comparable windows (this week vs. prior week) rather than one number in isolation."
    weight: 2
  - id: numeric_answer
    criterion: "Final paragraph gives concrete counts/rates and a conclusion."
    weight: 1
judge_context: |
  Ground truth (A9): `--since` accepts ISO8601 or relative like 7d/24h
  but errors tersely on anything else. The fixture's ticket
  timestamps determine the actual numbers; the judge should verify
  numeric consistency between the agent's answer and the transcript's
  list outputs, not enforce a specific count.
tags: [ambiguous, tickets, time-window, A9]
