id: "044"
title: "Pipeline refuses to start, no clear reason"
bucket: ambiguous
prompt: |
  I tried to run `ctl pipeline run pipe-01` and it printed 'refused'.
  What's happening and how do I actually run it?
judge_rubric:
  - id: reproduced
    criterion: "Agent ran `ctl pipeline run pipe-01` (or referenced the error) and saw 'refused'."
    weight: 1
  - id: identified_confirm_flag
    criterion: "Agent identified that pipe-01 is the deploy-prod pipeline and requires `--confirm`."
    weight: 3
  - id: reran_correctly
    criterion: "Agent ran `ctl pipeline run pipe-01 --confirm` and the run proceeded."
    weight: 2
  - id: explained_safety
    criterion: "Final answer mentions --confirm is a safety guard for prod deploys."
    weight: 1
judge_context: |
  Ground truth (A2): pipe-01 (deploy-prod) refuses without --confirm,
  error = 'refused'. Agent must add --confirm. SKILLS.md arm should
  know; cli-only arm must infer from --help or guess.
tags: [ambiguous, pipelines, A2, pipe-01]
