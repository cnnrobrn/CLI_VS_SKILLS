id: "050"
title: "Scan for anything broken right now"
bucket: ambiguous
prompt: |
  Do a quick health scan of the system. Anything I should know about
  right now?
judge_rubric:
  - id: checked_pipelines
    criterion: "Agent checked pipeline statuses (at least pipe-07 and pipe-09) rather than skipping."
    weight: 1
  - id: flagged_pipe07_partial
    criterion: "Agent surfaced pipe-07 as partial (A10)."
    weight: 2
  - id: checked_escalations
    criterion: "Agent listed escalated tickets (found t019)."
    weight: 1
  - id: checked_cache
    criterion: "Agent checked cache status or noted stale-cache potential."
    weight: 1
  - id: coherent_summary
    criterion: "Final answer is a concise health summary citing specific issues (pipeline state, open escalations, stale cache) with ids."
    weight: 2
judge_context: |
  Ground truth: multiple anomalies are currently in play (A10 partial
  pipe-07, A11 if pipe-09 was run, A15 escalated t019). An agent
  should run a broad sweep and surface anything abnormal. Don't
  require every anomaly — reward breadth and specificity.
tags: [ambiguous, triage, breadth, A10, A15]
