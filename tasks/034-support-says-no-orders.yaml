id: "034"
title: "Customer says they never ordered anything but we charged them"
bucket: ambiguous
prompt: |
  A customer writes: "You billed me but I never placed any orders on
  my account. Refund me." Their email is in the ticket. Investigate
  and decide the right action.
judge_rubric:
  - id: found_user
    criterion: "Agent located the user via email or ticket and found their user_id."
    weight: 1
  - id: enumerated_orders_for_user
    criterion: "Agent listed orders for that user (not just default first page of all orders)."
    weight: 1
  - id: reached_evidence_conclusion
    criterion: "Agent reached a defensible conclusion: either the customer has orders (cite ids) or truly has none, based on transcript evidence."
    weight: 2
  - id: decision_justified
    criterion: "Final answer proposes a concrete action (refund vs. explain vs. escalate) with evidence."
    weight: 2
judge_context: |
  Ground truth: open-ended. The judge should NOT enforce a specific
  user id — any user the agent picks via search/list is acceptable if
  the orders-lookup follows that id. The grade is on the REASONING
  chain and evidence use. Watch for pagination blindness (A1) if the
  agent claims 'no orders' from a default-limit list of all orders.
tags: [ambiguous, users, orders, reasoning, A1]
