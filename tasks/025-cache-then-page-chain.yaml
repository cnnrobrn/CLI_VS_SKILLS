id: "025"
title: "Run pipe-03 then fetch docs — handle the cache"
bucket: stateful
prompt: |
  Run pipe-03 to completion. Then fetch /docs/overview and give me a
  one-sentence summary of what's on that page.
rule_check:
  - id: ran_pipe03
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-03"
    weight: 1
  - id: cleared_cache
    assert: tool_called
    match:
      argv_regex: "^ctl cache clear"
    weight: 3
  - id: fetched_overview
    assert: tool_called
    match:
      argv_regex: "^ctl fetch /?docs/overview"
    weight: 2
  - id: sequence_pipe_cache_fetch
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl pipeline run pipe-03" }
      - { argv_regex: "^ctl cache clear" }
      - { argv_regex: "^ctl fetch /?docs/overview" }
    weight: 2
tags: [pipelines, fetch, cache, stateful, A4]
