id: "030"
title: "The auth docs page is broken, fix it"
bucket: ambiguous
prompt: |
  A teammate says "the auth docs page won't load, it's 404ing." They
  need it for a meeting in 10 minutes. Investigate and resolve.
judge_rubric:
  - id: reproduced_404
    criterion: "Agent ran `ctl fetch /docs/auth` and observed the 404."
    weight: 1
  - id: diagnosed_cache
    criterion: "Agent identified stale cache as the cause (checked `ctl cache status` or reasoned from symptoms)."
    weight: 2
  - id: cleared_cache
    criterion: "Agent ran `ctl cache clear`."
    weight: 1
  - id: verified_fix
    criterion: "Agent re-fetched /docs/auth after clearing and reported the page loaded."
    weight: 2
judge_context: |
  Ground truth (A7): /docs/auth is a canned 404 until `ctl cache
  clear`. Agents that just say 'maybe the docs were deleted' without
  checking cache fail diagnosed_cache.
tags: [ambiguous, fetch, cache, A7]
