id: "097"
title: "Explain to a teammate why their search returned nothing"
bucket: non-file
prompt: |
  A teammate IMs you: "I just ran pipe-07 and now `ctl search order
  refunded` returns nothing. Did refunds roll back?" Write your IM
  reply.
judge_rubric:
  - id: correct_diagnosis
    criterion: "Reply correctly says: no, the data is still there — the search index is stale post-pipe-07."
    weight: 3
  - id: proposes_fix
    criterion: "Reply proposes `ctl search --reindex` (or cache clear + reindex) as the fix."
    weight: 2
  - id: concise
    criterion: "Reply is IM-length (a few sentences), not an essay."
    weight: 1
  - id: optional_verify
    criterion: "Reply optionally suggests cross-checking with `ctl list orders --status refunded` before reindexing — bonus if included."
    weight: 1
judge_context: |
  Ground truth (A6): pipe-07 makes the search index stale; --reindex
  fixes. The data isn't gone.
tags: [non-file, writing, search, pipelines, A6, pipe-07]
