id: "045"
title: "Find last week's orders, --since is being weird"
bucket: ambiguous
prompt: |
  I want orders from the last week. I ran `ctl list orders --since
  "last Monday"` and got `invalid date`. Help me get the right list.
judge_rubric:
  - id: identified_format
    criterion: "Agent identified that --since needs ISO8601 or relative ('7d', '24h') — not natural language."
    weight: 2
  - id: used_valid_format
    criterion: "Agent successfully ran the command with a valid format (e.g., `--since 7d` or `--since 2026-04-17`)."
    weight: 2
  - id: returned_results
    criterion: "Agent reported the orders found in the valid window."
    weight: 2
judge_context: |
  Ground truth (A9): --since accepts ISO8601 or relative like 7d/24h;
  rejects 'last Monday' with terse 'invalid date'. With today pinned
  at 2026-04-24, `--since 7d` = from 2026-04-17.
tags: [ambiguous, orders, time-window, A9]
