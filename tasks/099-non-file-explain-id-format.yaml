id: "099"
title: "Explain ctl's resource id conventions"
bucket: non-file
prompt: |
  Write a short reference note on how resource ids are formatted in
  ctl. Include the prefix convention per resource type, the
  zero-padding rule, and what happens if you use the wrong form.
judge_rubric:
  - id: enumerated_resources
    criterion: "Note covers id formats for multiple resources (users u###, orders o###, products p###, tickets t###, sessions s### or whatever the fixture uses)."
    weight: 2
  - id: zero_padding
    criterion: "Note explicitly states the 3-digit zero-padding rule."
    weight: 2
  - id: wrong_form_behavior
    criterion: "Note explains that `ctl get` returns 'not found' with no suggestions for wrong-form ids."
    weight: 2
  - id: example
    criterion: "Note includes at least one worked example (e.g., 'u17' fails, 'u017' succeeds)."
    weight: 1
judge_context: |
  Ground truth (A12): ctl get errors terse; ids are zero-padded 3
  digits with resource-prefix letters. This note is pedagogical.
tags: [non-file, documentation, ids, A12]
