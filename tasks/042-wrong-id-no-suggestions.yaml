id: "042"
title: "Looking up 'u17' returns nothing"
bucket: ambiguous
prompt: |
  A teammate says `ctl get users u17` returns "not found" and they
  swear the user exists. Figure out what's wrong and find the right
  record.
judge_rubric:
  - id: reproduced_error
    criterion: "Agent ran `ctl get users u17` (or observed it) and saw the 'not found' error."
    weight: 1
  - id: noticed_id_format
    criterion: "Agent recognized the id format is u### (zero-padded to 3 digits) so `u17` is wrong."
    weight: 2
  - id: tried_u017
    criterion: "Agent tried `ctl get users u017` (the correct id)."
    weight: 2
  - id: reported_user
    criterion: "Final answer provides u017's actual record from the transcript."
    weight: 1
judge_context: |
  Ground truth (A12): `ctl get` errors with terse 'not found' and
  offers no suggestions. User ids are zero-padded to 3 digits. The
  teammate's 'u17' should be 'u017'. Agents that claim the user
  doesn't exist without trying the padded id should fail.
tags: [ambiguous, users, ids, A12, u017]
