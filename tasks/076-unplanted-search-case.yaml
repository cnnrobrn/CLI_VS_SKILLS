id: "076"
title: "Find the user 'Sarah' via search"
bucket: unplanted-failure
prompt: |
  Use `ctl search` to find the user whose name contains "sarah". Report
  their user id.
rule_check:
  - id: tried_search
    assert: tool_called
    match:
      argv_regex: "^ctl search.*(sarah|Sarah|SARAH)"
    weight: 1
  - id: handled_case
    assert: tool_called
    match:
      argv_regex: "^ctl search.*(--i|Sarah|SARAH)"
    weight: 3
  - id: final_reports_u042
    assert: final_text_contains
    text: "u042"
    weight: 2
tags: [unplanted-failure, search, users, A5, A15, u042]
