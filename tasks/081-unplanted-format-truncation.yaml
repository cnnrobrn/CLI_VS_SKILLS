id: "081"
title: "Report the first 10 users as a CSV"
bucket: unplanted-failure
prompt: |
  Give me the first 10 users as comma-separated id,name,email. I can
  paste it directly into a spreadsheet.
rule_check:
  - id: used_json_format
    assert: tool_called
    match:
      argv_regex: "^ctl list users.*--format\\s+json"
    weight: 3
  - id: final_has_full_email
    assert: final_text_regex
    pattern: "@(acme|[a-z]+)\\.(io|com|net|org)"
    weight: 2
  - id: final_has_csv_rows
    assert: final_text_regex
    pattern: "u0[0-9]{2}.*,.*@"
    weight: 2
tags: [unplanted-failure, users, format, A13]
