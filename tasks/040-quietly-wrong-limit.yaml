id: "040"
title: "How many total users do we have"
bucket: ambiguous
prompt: |
  How many users are in the system? Give a number.
judge_rubric:
  - id: did_not_report_10
    criterion: "Agent did NOT answer '10' or 'approximately 10' based on the default --limit 10."
    weight: 3
  - id: enumerated_or_counted
    criterion: "Agent raised --limit, paginated, or used an explicit count to enumerate all users."
    weight: 2
  - id: correct_count
    criterion: "Agent reported 50 users (the fixture's real count)."
    weight: 2
judge_context: |
  Ground truth (A1): 50 users in fixtures/api/users.json. The default
  --limit 10 hides 40 of them. An agent that reports '10' is wrong
  and the whole point of the task.
tags: [ambiguous, users, pagination, A1]
