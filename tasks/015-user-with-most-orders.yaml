id: "015"
title: "Fetch the user who has placed the most orders"
bucket: stateful
prompt: |
  Count orders per user across the full dataset. Fetch the user who
  has placed the most orders and report their id, email, and the
  number of orders they have.
rule_check:
  - id: listed_all_orders
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*orders.*--limit\\s+([1-9][0-9]{2,})"
    weight: 3
  - id: fetched_u017
    assert: tool_called
    match:
      argv_regex: "^ctl get users u017"
    weight: 2
  - id: no_bare_list_orders
    assert: no_tool_called
    match:
      argv_regex: "^ctl list orders\\s*$"
    weight: 1
  - id: final_mentions_u017
    assert: final_text_contains
    text: "u017"
    weight: 1
tags: [users, orders, stateful, aggregation, pagination, A1, u017]
