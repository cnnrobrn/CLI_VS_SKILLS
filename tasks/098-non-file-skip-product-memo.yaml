id: "098"
title: "Memo: why pipe-04 'succeeded' but didn't actually"
bucket: non-file
setup: |
  ./cli/bin/ctl pipeline run pipe-04
prompt: |
  Write a short engineering memo explaining the pipe-04 exit-0-but-
  skipped-records behavior. Include: exactly what pipe-04 does on
  skip, how an engineer would discover this, and a proposed fix to
  the CLI's output contract.
judge_rubric:
  - id: observed_behavior
    criterion: "Agent ran pipe-04 and observed the stderr warning + /tmp/pipe-04.skipped artifact."
    weight: 2
  - id: explained_split
    criterion: "Memo explains that exit-0 is misleading because warnings/skips are only on stderr + a side-channel file."
    weight: 2
  - id: concrete_fix
    criterion: "Memo proposes a concrete fix (non-zero exit on skips, structured JSON output, or documented skip-file path in stdout)."
    weight: 2
  - id: audience_appropriate
    criterion: "Memo is written for engineers (concise, concrete), not a customer-facing apology."
    weight: 1
judge_context: |
  Ground truth (A17): pipe-04 exits 0 with stderr warning and
  /tmp/pipe-04.skipped listing skipped ids/reasons.
tags: [non-file, documentation, pipelines, A17, pipe-04]
