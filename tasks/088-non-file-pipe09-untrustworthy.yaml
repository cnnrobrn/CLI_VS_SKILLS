id: "088"
title: "Why we can't trust pipe-09's OK exit"
bucket: non-file
prompt: |
  Write a short technical note (for our team wiki) explaining why
  pipe-09's 'status: ok' is not sufficient evidence that inventory
  is correct, and what to do instead.
judge_rubric:
  - id: verified_empirically
    criterion: "Agent ran both `ctl pipeline run pipe-09` and `ctl pipeline run pipe-09 --verify` to observe the difference."
    weight: 2
  - id: clear_thesis
    criterion: "Note clearly states: exit code does not reflect correctness for pipe-09 without --verify."
    weight: 2
  - id: cites_discrepancies
    criterion: "Note cites specific product ids surfaced by --verify (p014, p037, p061)."
    weight: 2
  - id: recommended_practice
    criterion: "Note ends with a concrete team practice ('always use --verify', 'CI rule', etc.)."
    weight: 1
judge_context: |
  Ground truth (A11): pipe-09 is false-OK without --verify. The note
  should be specific, not hand-wavy.
tags: [non-file, documentation, pipelines, products, A11, pipe-09]
