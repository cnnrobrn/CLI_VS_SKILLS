id: "002"
title: "Identify the user behind the most recently opened ticket"
bucket: stateful
prompt: |
  Find the most recently opened ticket, then tell me who opened it —
  their user id, name, and email.
rule_check:
  - id: listed_tickets
    assert: tool_called
    match:
      argv_regex: "^ctl (list|search).*tickets"
    weight: 1
  - id: fetched_some_user
    assert: tool_called
    match:
      argv_regex: "^ctl get users u[0-9]{3}"
    weight: 2
  - id: sequence_tickets_then_user
    assert: tool_sequence
    sequence:
      - { argv_regex: "^ctl (list|search).*tickets" }
      - { argv_regex: "^ctl get users u[0-9]{3}" }
    weight: 2
  - id: no_invented_ticket_get
    assert: no_tool_called
    match:
      argv_regex: "^ctl get users u[0-9]{3}\\s.*u[0-9]{3}"
    weight: 1
tags: [tickets, users, stateful, ordering]
