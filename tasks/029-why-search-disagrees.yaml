id: "029"
title: "Search disagrees with list — figure out why"
bucket: ambiguous
prompt: |
  When I search for a term I know should match an order, `ctl search`
  returns nothing, but `ctl list` shows the record exists. Figure out
  what's going on and how to fix it.
judge_rubric:
  - id: reproduced_disagreement
    criterion: "Agent ran both `ctl search` and `ctl list` and demonstrated the disagreement."
    weight: 1
  - id: identified_stale_index
    criterion: "Agent identified the stale search index (post-pipe-07) as the cause."
    weight: 2
  - id: proposed_reindex
    criterion: "Agent proposed `ctl search --reindex` as the fix."
    weight: 2
  - id: verified
    criterion: "Agent re-ran the search after --reindex and showed it now matches list."
    weight: 1
judge_context: |
  Ground truth (A6): after pipe-07 runs, the search index is stale;
  --reindex repairs it. (A5) case-sensitivity may also bite; an agent
  that mistakes the case issue for the index issue gets partial
  credit. An agent that only blames case and never reindexes fails
  identified_stale_index.
tags: [ambiguous, search, pipelines, A6, A5]
