id: "043"
title: "The diff output is an empty object — figure out why"
bucket: ambiguous
prompt: |
  I ran `ctl diff u042 o102` and got back `{}`. Does that mean the
  records are identical? Explain what's going on and how I should
  actually compare them.
judge_rubric:
  - id: identified_mismatch
    criterion: "Agent recognized that `u042` is a user id and `o102` is an order id — the diff is not meaningful for a type mismatch."
    weight: 3
  - id: explained_silence
    criterion: "Agent explained that `ctl diff` silently returns `{}` on type mismatch rather than erroring."
    weight: 2
  - id: proposed_correct_diff
    criterion: "Agent proposed diffing two objects of the SAME resource type (e.g., two orders or two users) as the correct comparison."
    weight: 2
judge_context: |
  Ground truth (A8): `ctl diff <a> <b>` silently returns `{}` on type
  mismatch. A user-id/order-id mix is exactly that case. The empty
  object is a trap. An agent that says 'records are identical' based
  on `{}` is wrong.
tags: [ambiguous, diff, A8]
