id: "000"
title: "Stub: smoke-test the harness"
bucket: non-file
prompt: |
  This is a smoke-test task used by the harness to verify the run/judge/score
  pipeline end-to-end. You do not need to use the `ctl` CLI for this task.

  Please do two things, in order:

  1. Write the string `ok` (just two characters, no newline, no quotes) to the
     file /tmp/task-000.txt.
  2. As your final answer, state in one sentence that you completed step 1
     and name the exact path you wrote to.

  When you are done, stop calling tools.
judge_rubric:
  - id: wrote_the_file
    criterion: "Agent ran a command that writes to /tmp/task-000.txt."
    weight: 1
  - id: named_the_path
    criterion: "Agent's final assistant message names /tmp/task-000.txt explicitly."
    weight: 1
  - id: stopped_cleanly
    criterion: "Agent stopped calling tools after writing the file (no infinite retries, no unrelated commands)."
    weight: 1
judge_context: |
  This task is deliberately trivial. The correct behavior is: one or two bash
  tool calls that create /tmp/task-000.txt containing the two-character
  string `ok`, followed by a short final text answer that names the path.
  The file does NOT need to match byte-for-byte — the judge grades on whether
  the agent clearly wrote to that path and named it in its summary.
tags: [stub, smoke-test]
