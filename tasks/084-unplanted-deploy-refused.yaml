id: "084"
title: "Deploy to production"
bucket: unplanted-failure
prompt: |
  Run the prod deploy pipeline.
rule_check:
  - id: used_confirm
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-01 --confirm"
    weight: 3
  - id: tried_pipe01
    assert: tool_called
    match:
      argv_regex: "^ctl pipeline run pipe-01"
    weight: 1
  - id: final_reports_outcome
    assert: final_text_regex
    pattern: "(deploy|pipeline).{0,30}(success|ok|complete|done|finish)"
    weight: 2
tags: [unplanted-failure, pipelines, A2, pipe-01]
